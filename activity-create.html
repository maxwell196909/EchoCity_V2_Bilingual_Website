<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>发起共同活动 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #061321;
      --panel: #10243a;
      --border: rgba(150, 190, 225, 0.2);
      --text: #f7f9ff;
      --muted: #9eb4cc;
      --blue: #2687ee;
      --green: #31d39b;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(
          circle at 75% 10%,
          rgba(38, 135, 238, 0.2),
          transparent 35%
        ),
        var(--bg);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: auto;
      padding: 28px 0 50px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }

    .brand h1 {
      font-size: 27px;
    }

    .brand p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .top-actions a,
    .language-button {
      padding: 9px 13px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
    }

    .language-button.active {
      background: var(--blue);
    }

    .hero {
      padding: 30px;
      margin-bottom: 22px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background:
        linear-gradient(
          120deg,
          rgba(20, 113, 198, 0.65),
          rgba(78, 61, 163, 0.55)
        );
    }

    .hero h2 {
      margin-bottom: 10px;
      font-size: clamp(26px, 4vw, 42px);
    }

    .hero p {
      max-width: 760px;
      color: #d8e7f7;
      line-height: 1.8;
    }
  </style>
</head><body>
  <div class="page">

    <header class="topbar">

        <p

        </p >
      </div>

      <div class="top-actions">

      </div>
    </header>

    <section class="hero">
      <h2

        你想和大家一起做什么？

      <p

    <section class="activity-section">

    </section><style>
  .activity-section,
  .activity-form-section {
    padding: 24px;

    border: 1px solid var(--border);
    border-radius: 20px;

  }

  .section-heading {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
  }

  .section-heading h3 {
    margin-bottom: 7px;
    font-size: 21px;
  }

  .section-heading p {

    font-size: 13px;

  }

  .activity-grid {

  .activity-type {

  .activity-type.active {
    border-color: var(--blue);
    background: rgba(38, 135, 238, 0.16);
  }

  .activity-icon {
    font-size: 32px;
  }

  .activity-type strong {
    font-size: 16px;
  }

  .activity-type small {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }
</style><style>
  .activity-form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .form-field {
    display: grid;
    gap: 8px;
  }

  .form-field span {
    color: var(--muted);
    font-size: 13px;
  }

  .form-field input,
  .form-field select,
  .form-field textarea {
    width: 100%;
    padding: 12px 13px;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    background: rgba(255, 255, 255, 0.045);
  }

  .form-field input:focus,
  .form-field select:focus,
  .form-field textarea:focus {

  .form-field select option {

  .echo-summary {

    padding: 16px;
    margin-top: 18px;

    background: rgba(49, 211, 155, 0.07);
  }

  .echo-avatar {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;

  .echo-summary strong {

  .form-actions {

    gap: 11px;

  .secondary-action,

</style><style>

</style><script>
  const activityButtons =
    document.querySelectorAll(".activity-type");

  const activityTitle =
    document.getElementById("activityTitle");

  const activityDate =
    document.getElementById("activityDate");

  const activityTime =
    document.getElementById("activityTime");

  const participantCount =
    document.getElementById("participantCount");

  const searchRadius =
    document.getElementById("searchRadius");

  const activityNotes =
    document.getElementById("activityNotes");

  const echoSummaryText =
    document.getElementById("echoSummaryText");

  const nextStepButton =
    document.getElementById("nextStepButton");

  const zhBtn =
    document.getElementById("zhBtn");

  const enBtn =
    document.getElementById("enBtn");

  let selectedActivityType = "basketball";
  let currentLanguage =
    localStorage.getItem("echocityLanguage") || "zh";

  const activityNames = {
    basketball: {
      zh: "篮球",
      en: "Basketball"
    },

    coffee: {
      zh: "喝咖啡",
      en: "Coffee"
    },

    dinner: {
      zh: "共同聚餐",
      en: "Shared Dinner"
    },

    church: {
      zh: "教会活动",
      en: "Church Activity"
    },

    movie: {
      zh: "共同拍电影",
      en: "Make a Movie"
    },

    volunteer: {
      zh: "志愿服务",
      en: "Volunteer Service"
    },

    companion: {
      zh: "情感陪伴",
      en: "Companionship"
    },

    counseling: {
      zh: "专业咨询",
      en: "Professional Counseling"
    }
  };

  function setDefaultDate() {
    if (activityDate.value) {
      return;
    }

    const today = new Date();
    today.setDate(today.getDate() + 1);

    activityDate.value =
      today.toISOString().split("T")[0];
  }

  function updateEchoSummary() {
    const activityName =
      activityNames[selectedActivityType][currentLanguage];

    const radius = searchRadius.value;
    const count = participantCount.value;

    if (currentLanguage === "en") {
      echoSummaryText.textContent =
        `You are creating ${activityName}. ` +
        `Echo will look for up to ${count} suitable residents ` +
        `within ${radius} km and recommend suitable locations.`;
    } else {
      echoSummaryText.textContent =
        `你正在发起${activityName}。` +
        `数字人 Echo 将在${radius}公里内，` +
        `为你匹配最多${count}位合适的居民，` +
        `并推荐适合大家的活动地点。`;
    }
  }

  function setLanguage(language) {
    currentLanguage = language;

    localStorage.setItem(
      "echocityLanguage",
      language
    );

    document.documentElement.lang =
      language === "en" ? "en" : "zh-CN";

    document
      .querySelectorAll("[data-zh][data-en]")
      .forEach((element) => {
        element.textContent =
          language === "en"
            ? element.dataset.en
            : element.dataset.zh;
      });

    document
      .querySelectorAll(
        "[data-zh-placeholder][data-en-placeholder]"
      )
      .forEach((element) => {
        element.placeholder =
          language === "en"
            ? element.dataset.enPlaceholder
            : element.dataset.zhPlaceholder;
      });

    zhBtn.classList.toggle(
      "active",
      language === "zh"
    );

    enBtn.classList.toggle(
      "active",
      language === "en"
    );

    updateEchoSummary();
  }

  activityButtons.forEach((button) => {
    button.addEventListener("click", () => {
      activityButtons.forEach((item) => {
        item.classList.remove("active");
      });

      button.classList.add("active");

      selectedActivityType =
        button.dataset.type;

      const selectedName =
        activityNames[selectedActivityType][currentLanguage];

      if (
        !activityTitle.value.trim() ||
        activityTitle.dataset.autoFilled === "true"
      ) {
        activityTitle.value =
          currentLanguage === "en"
            ? `My ${selectedName} Activity`
            : `我的${selectedName}活动`;

        activityTitle.dataset.autoFilled = "true";
      }

      updateEchoSummary();
    });
  });

  activityTitle.addEventListener("input", () => {
    activityTitle.dataset.autoFilled = "false";
  });

  participantCount.addEventListener(
    "change",
    updateEchoSummary
  );

  searchRadius.addEventListener(
    "change",
    updateEchoSummary
  );

  zhBtn.addEventListener("click", () => {
    setLanguage("zh");
  });

  enBtn.addEventListener("click", () => {
    setLanguage("en");
  });

  nextStepButton.addEventListener("click", () => {
    const title = activityTitle.value.trim();

    if (!title) {
      alert(
        currentLanguage === "en"
          ? "Please enter an activity name."
          : "请输入活动名称。"
      );

      activityTitle.focus();
      return;
    }

    if (!activityDate.value) {
      alert(
        currentLanguage === "en"
          ? "Please select an activity date."
          : "请选择活动日期。"
      );

      activityDate.focus();
      return;
    }

    const activityData = {
      id: `activity-${Date.now()}`,
      type: selectedActivityType,
      title: title,
      date: activityDate.value,
      time: activityTime.value,
      participants: Number(
        participantCount.value
      ),
      radius: Number(searchRadius.value),
      notes: activityNotes.value.trim(),
      status: "matching",
      createdAt: new Date().toISOString()
    };

    localStorage.setItem(
      "echocityCurrentActivity",
      JSON.stringify(activityData)
    );

    window.location.href =
      `city-map.html?type=${encodeURIComponent(
        selectedActivityType
      )}`;
  });

  setDefaultDate();
  setLanguage(currentLanguage);
</script>

  </div>
</script>

<script>
  document.querySelectorAll(".activity-type").forEach((button) => {
    button.onclick = function () {
      document.querySelectorAll(".activity-type").forEach((item) => {
        item.classList.remove("active");
      });

      this.classList.add("active");
    };
  });
</script>

</div>
</body>
</html>
