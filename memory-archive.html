<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>我的记忆档案 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #ffffff;
      background:
        linear-gradient(
          rgba(7, 18, 28, 0.84),
          rgba(7, 18, 28, 0.96)
        ),
        url("city-vision.jpg") center / cover fixed;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 7%;
      background: rgba(8, 22, 32, 0.94);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .logo {
      color: #f1b44c;
      font-size: 24px;
      font-weight: bold;
    }

    .top-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-link {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 17px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
    }

    .top-link:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .page {
      width: min(1120px, 92%);
      margin: 45px auto 70px;
    }

    .hero {
      margin-bottom: 30px;
      padding: 32px;
      text-align: center;
      background:
        linear-gradient(
          145deg,
          rgba(20, 57, 75, 0.96),
          rgba(34, 43, 66, 0.96)
        );
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
    }

    .hero h1 {
      margin-bottom: 12px;
      font-size: 40px;
    }

    .hero p {
      color: #cbd7dd;
      line-height: 1.8;
    }

    .resident-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #17303d;
      font-size: 26px;
      font-weight: bold;
      background: #f1b44c;
      border-radius: 50%;
    }

    .resident-info h2 {
      margin-bottom: 5px;
      font-size: 24px;
    }

    .resident-info p {
      color: #c4d0d6;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 26px;
    }

    .panel {
      padding: 27px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 22px;
      backdrop-filter: blur(12px);
    }

    .panel h2 {
      margin-bottom: 21px;
      color: #f1b44c;
      font-size: 23px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      color: #ffffff;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #f1b44c;
    }

    input::placeholder,
    textarea::placeholder {
      color: #b8c4ca;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    option {
      color: #111111;
    }

    .save-button {
      width: 100%;
      padding: 14px;
      color: #172b35;
      font-size: 16px;
      font-weight: bold;
      background: #f1b44c;
      border: none;
      border-radius: 28px;
      cursor: pointer;
    }

    .save-button:hover {
      background: #ffd078;
    }

    .clear-button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      color: #ffffff;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 26px;
      cursor: pointer;
    }

    .memory-list {
      display: grid;
      gap: 17px;
    }

    .memory-card {
      padding: 20px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 17px;
    }

    .memory-top {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 10px;
    }

    .memory-card h3 {
      color: #f1b44c;
      font-size: 19px;
    }

    .memory-date {
      color: #aebdc5;
      font-size: 13px;
      white-space: nowrap;
    }

    .memory-card p {
      color: #dce5e9;
      line-height: 1.75;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .memory-meta {
      margin-top: 12px;
      color: #9fb0b8;
      font-size: 13px;
    }

    .delete-button {
      margin-top: 13px;
      padding: 7px 12px;
      color: #ffffff;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      cursor: pointer;
    }

    .delete-button:hover {
      background: rgba(255, 90, 90, 0.18);
    }

    .empty-state {
      padding: 32px 20px;
      color: #b8c6cc;
      text-align: center;
      line-height: 1.8;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 17px;
    }

    .statement {
      margin-top: 28px;
      padding: 22px;
      color: #d5dfe4;
      text-align: center;
      line-height: 1.8;
      background: rgba(8, 22, 32, 0.76);
      border-radius: 18px;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 31px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 13px;
      }

      .memory-top {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="logo">EchoCity</div>

    <div class="top-links">
      <a class="top-link" href=" ">
        我的家
      </a >

      <a class="top-link" href="life-timeline.html">
        生活时间线
      </a >

      <a class="top-link" href="index.html">
        返回首页
      </a >
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>我的记忆档案</h1>

      <p>
        保存那些值得被记住的人、事情、感受与生命片段。<br />
        记忆不仅属于过去，也帮助我们理解今天的自己。
      </p >
    </section>

    <section class="resident-bar">
      <div class="avatar" id="avatar">E</div>

      <div class="resident-info">
        <h2 id="residentName">EchoCity 居民</h2>
        <p id="residentNumber">居民编号：尚未生成</p >
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>保存一段记忆</h2>

        <div class="form-group">
          <label for="memoryTitle">记忆标题</label>

          <input
            id="memoryTitle"
            type="text"
            placeholder="例如：第一次来到 EchoCity"
          />
        </div>

        <div class="form-group">
          <label for="memoryType">记忆类型</label>

          <select id="memoryType">
            <option value="人生">人生</option>
            <option value="家庭">家庭</option>
            <option value="朋友">朋友</option>
            <option value="成长">成长</option>
            <option value="信仰">信仰</option>
            <option value="工作">工作</option>
            <option value="城市">城市</option>
            <option value="照片说明">照片说明</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="memoryDate">记忆日期</label>

          <input
            id="memoryDate"
            type="date"
          />
        </div>

        <div class="form-group">
          <label for="memoryContent">记忆内容</label>

          <textarea
            id="memoryContent"
            placeholder="写下这段记忆发生了什么，它为什么值得被保存。"
          ></textarea>
        </div>

        <button
          class="save-button"
          type="button"
          onclick="saveMemory()"
        >
          保存到记忆档案
        </button>

        <button
          class="clear-button"
          type="button"
          onclick="clearAllMemories()"
        >
          清空全部记忆
        </button>
      </div>

      <div class="panel">
        <h2>已经保存的记忆</h2>

        <div class="memory-list" id="memoryList"></div>
      </div>
    </section>

    <section class="statement">
      数据因人而存在，文明因灵魂而生。记忆档案保存的不是冰冷数据，而是生命留下的真实痕迹。
    </section>
  </main>

  <script>
    const identityKey = "echoCityIdentity";
    const memoryKey = "echoCityMemories";

    function getIdentity() {
      const savedIdentity =
        localStorage.getItem(identityKey);

      if (!savedIdentity) {
        return null;
      }

      try {
        return JSON.parse(savedIdentity);
      } catch (error) {
        console.error("读取身份失败：", error);
        return null;
      }
    }

    function getMemories() {
      const savedMemories =
        localStorage.getItem(memoryKey);

      if (!savedMemories) {
        return [];
      }

      try {
        const memories = JSON.parse(savedMemories);

        return Array.isArray(memories)
          ? memories
          : [];
      } catch (error) {
        console.error("读取记忆失败：", error);
        return [];
      }
    }

    function storeMemories(memories) {
      localStorage.setItem(
        memoryKey,
        JSON.stringify(memories)
      );
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateValue) {
      if (!dateValue) {
        return new Date().toLocaleDateString("zh-CN");
      }

      const date =
        new Date(dateValue + "T00:00:00");

      return date.toLocaleDateString("zh-CN");
    }

    function loadResident() {
      const identity = getIdentity();

      if (!identity) {
        alert("还没有创建数字身份，请先建立身份。");
        window.location.href = "mycity.html";
        return false;
      }

      document.getElementById("residentName").textContent =
        identity.name || "EchoCity 居民";

      document.getElementById("residentNumber").textContent =
        "居民编号：" +
        (identity.identityNumber || "尚未生成");

      document.getElementById("avatar").textContent =
        identity.name
          ? identity.name.charAt(0).toUpperCase()
          : "E";

      return true;
    }

    function renderMemories() {
      const memoryList =
        document.getElementById("memoryList");

      const memories = getMemories();

      memoryList.innerHTML = "";

      if (memories.length === 0) {
        memoryList.innerHTML = `
          <div class="empty-state">
            还没有保存记忆。<br />
            从一段值得记住的故事开始。
          </div>
        `;

        return;
      }

      memories
        .sort(function (a, b) {
          return new Date(b.date) - new Date(a.date);
        })
        .forEach(function (memory) {
          const card =
            document.createElement("article");

          card.className = "memory-card";

          card.innerHTML = `
            <div class="memory-top">
              <h3>${escapeHtml(memory.title)}</h3>

              <div class="memory-date">
                ${formatDate(memory.date)}
              </div>
            </div>

            <p>${escapeHtml(memory.content)}</p >

            <div class="memory-meta">
              记忆类型：${escapeHtml(memory.type)}
            </div>

            <button
              class="delete-button"
              type="button"
              onclick="deleteMemory('${memory.id}')"
            >
              删除这段记忆
            </button>
          `;

          memoryList.appendChild(card);
        });
    }

    function saveMemory() {
      const title =
        document
          .getElementById("memoryTitle")
          .value
          .trim();

      const type =
        document.getElementById("memoryType").value;

      const date =
        document.getElementById("memoryDate").value;

      const content =
        document
          .getElementById("memoryContent")
          .value
          .trim();

      if (!title) {
        alert("请填写记忆标题。");
        document.getElementById("memoryTitle").focus();
        return;
      }

      if (!content) {
        alert("请填写记忆内容。");
        document.getElementById("memoryContent").focus();
        return;
      }

      const memories = getMemories();

      memories.push({
        id:
          "memory-" +
          Date.now() +
          "-" +
          Math.floor(Math.random() * 10000),
        title,
        type,
        date:
          date ||
          new Date().toISOString().split("T")[0],
        content
      });

      storeMemories(memories);

      document.getElementById("memoryTitle").value = "";
      document.getElementById("memoryType").value = "人生";
      document.getElementById("memoryContent").value = "";

      renderMemories();

      alert("这段记忆已经保存。");
    }

    function deleteMemory(memoryId) {
      const confirmed =
        confirm("确定删除这段记忆吗？");

      if (!confirmed) {
        return;
      }

      const memories =
        getMemories().filter(function (memory) {
          return memory.id !== memoryId;
        });

      storeMemories(memories);
      renderMemories();
    }

    function clearAllMemories() {
      const memories = getMemories();

      if (memories.length === 0) {
        alert("目前没有可以清空的记忆。");
        return;
      }

      const confirmed =
        confirm("确定清空全部记忆档案吗？");

      if (!confirmed) {
        return;
      }

      localStorage.removeItem(memoryKey);
      renderMemories();

      alert("全部记忆已经清空。");
    }

    function setToday() {
      document.getElementById("memoryDate").value =
        new Date().toISOString().split("T")[0];
    }

    window.addEventListener(
      "DOMContentLoaded",
      function () {
        const loaded = loadResident();

        if (!loaded) {
          return;
        }

        setToday();
        renderMemories();
      }
    );
  </script>
</body>
</html>
