<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布我的愿望｜EchoCity</title>
  <link rel="stylesheet" href="style.css?v=20260716-2">
</head>
<body class="inner-page">
  <header class="simple-header">
    <a class="brand" href="index.html"><span class="brand-mark">E</span><span>EchoCity</span></a>
    <a class="text-link" href="wall.html">愿望广场 →</a>
  </header>

  <main class="form-shell">
    <section class="form-card">
      <p class="eyebrow">START YOUR JOURNEY</p>
      <h1>发布我的愿望</h1>
      <p class="intro">每一个伟大的故事，都始于一个真实的愿望。</p>

      <form id="wishForm">
        <label for="wish">1. 你的愿望是什么？</label>
        <textarea id="wish" required placeholder="请写下一个对你真正重要、愿意开始行动的愿望。"></textarea>

        <label for="importance">2. 为什么它对你重要？</label>
        <textarea id="importance" placeholder="它与你的人生、家庭、信念或未来有什么关系？"></textarea>

        <label for="difficulty">3. 你现在最大的困难是什么？</label>
        <textarea id="difficulty" placeholder="资金、能力、时间、信息、资源，还是缺少同行者？"></textarea>

        <label for="companion">4. 希望谁与你同行？</label>
        <textarea id="companion" placeholder="你希望遇见什么样的人？"></textarea>

        <label for="firstStep">5. 第一步准备做什么？</label>
        <textarea id="firstStep" placeholder="写下一个今天、明天或本周就能开始的小行动。"></textarea>

        <button id="publishButton" class="btn btn-primary submit-button" type="submit">发布我的愿望</button>
        <p id="message" class="form-message" aria-live="polite"></p>
      </form>

      <section id="result" class="wish-result" hidden>
        <p class="eyebrow">MY WISH CARD</p>
        <h2>我的愿望卡片</h2>
        <div id="wishCard"></div>
        <div class="result-actions">
          <a class="btn btn-secondary" href="wall.html">进入愿望广场</a>
          <button class="btn btn-ghost" type="button" id="newWishButton">再发布一个愿望</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://fhckjaidiqnozhpxkavt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_g--rklRl7JhuX2RsA5L-ow_wi5w9tYa";

    const form = document.getElementById("wishForm");
    const button = document.getElementById("publishButton");
    const message = document.getElementById("message");
    const result = document.getElementById("result");
    const wishCard = document.getElementById("wishCard");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        wish: document.getElementById("wish").value.trim(),
        importance: document.getElementById("importance").value.trim(),
        difficulty: document.getElementById("difficulty").value.trim(),
        companion: document.getElementById("companion").value.trim(),
        first_step: document.getElementById("firstStep").value.trim()
      };

      if (!payload.wish) {
        setMessage("请先填写你的愿望。", true);
        return;
      }

      button.disabled = true;
      button.textContent = "正在发布……";
      setMessage("正在把你的愿望送往 EchoCity……", false);

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Prefer": "return=representation"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || data.details || "数据库写入失败");

        const saved = Array.isArray(data) ? data[0] : data;
        wishCard.innerHTML = `
          <p><strong>愿望：</strong>${escapeHtml(saved.wish)}</p>
          <p><strong>为什么重要：</strong>${escapeHtml(saved.importance || "未填写")}</p>
          <p><strong>当前困难：</strong>${escapeHtml(saved.difficulty || "未填写")}</p>
          <p><strong>希望谁同行：</strong>${escapeHtml(saved.companion || "未填写")}</p>
          <p><strong>第一步：</strong>${escapeHtml(saved.first_step || "未填写")}</p>
          <p><small>发布时间：${new Date(saved.created_at).toLocaleString()}</small></p>
        `;

        result.hidden = false;
        form.hidden = true;
        result.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (error) {
        setMessage(`发布失败：${error.message}`, true);
      } finally {
        button.disabled = false;
        button.textContent = "发布我的愿望";
      }
    });

    document.getElementById("newWishButton").addEventListener("click", () => {
      form.reset();
      form.hidden = false;
      result.hidden = true;
      message.textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function setMessage(text, isError) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
