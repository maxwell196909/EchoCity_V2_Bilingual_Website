<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>我的数字电影 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(
          rgba(5, 12, 26, 0.84),
          rgba(5, 12, 26, 0.96)
        ),
        url("future-city.jpg") center / cover fixed;
      color: #ffffff;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(1080px, 94%);
      margin: 0 auto;
      padding: 26px 0 60px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 24px;
    }

    .back-button,
    .language-button {
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      cursor: pointer;
    }

    .movie-hero {
      position: relative;
      overflow: hidden;
      padding: 32px;
      border-radius: 28px;
      background:
        linear-gradient(
          135deg,
          rgba(12, 33, 63, 0.94),
          rgba(27, 19, 59, 0.94)
        );
      border: 1px solid rgba(255, 255, 255, 0.12);
      margin-bottom: 22px;
    }

    .movie-hero::after {
      content: "🎬";
      position: absolute;
      right: 30px;
      bottom: -24px;
      font-size: 130px;
      opacity: 0.08;
      pointer-events: none;
    }

    .hero-label {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(114, 170, 255, 0.15);
      color: #a9d5ff;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .hero-title {
      max-width: 760px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .hero-text {
      max-width: 720px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.8;
    }

    .movie-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .summary-card {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .summary-number {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .summary-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.58);
    }

    .movie-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.6fr);
      gap: 20px;
    }    .movie-panel,
    .movie-sidebar {
      padding: 24px;
      border-radius: 24px;
      background: rgba(11, 25, 47, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
    }

    .panel-title {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .movie-timeline {
      display: grid;
      gap: 16px;
    }

    .movie-scene {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease;
    }

    .movie-scene:hover {
      transform: translateY(-3px);
    }

    .scene-year {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
    }

    .scene-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .scene-description {
      color: rgba(255,255,255,0.68);
      line-height: 1.7;
    }

    .generate-button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg,#4db7ff,#746cff);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
    }

    .generate-button:hover {
      opacity: .95;
    }

    @media (max-width: 760px) {

      .movie-summary {
        grid-template-columns: 1fr;
      }

      .movie-layout {
        grid-template-columns: 1fr;
      }

      .movie-hero,
      .movie-panel,
      .movie-sidebar {
        padding: 20px;
      }

    }

  </style>
</head>

<body>

<div class="page">

<div class="top-bar">

<button
class="back-button"
id="backButton">

← 返回人生轨迹

</button>

<button
class="language-button"
id="languageButton">

EN

</button>

</div>

<section class="movie-hero">

<span
class="hero-label"
id="heroLabel">

数字人生电影

</span>

<h1
class="hero-title"
id="heroTitle">

我的数字电影

</h1>

<p
class="hero-text"
id="heroText">

把人生轨迹、共同记忆和成长过程自动整理成一部持续更新的数字电影。

</p >

<div class="movie-summary">

<div class="summary-card">

<div
class="summary-number"
id="sceneCount">

0

</div>

<div
class="summary-label"
id="sceneLabel">

电影片段

</div>

</div>

<div class="summary-card">

<div
class="summary-number"
id="memoryCount">

0

</div>

<div
class="summary-label"
id="memoryLabel">

共同记忆

</div>

</div>

<div class="summary-card">

<div
class="summary-number"
id="yearCount">

0

</div>

<div
class="summary-label"
id="yearLabel">

人生年份

</div>

</div>

</div>

</section>

<div class="movie-layout">

<div class="movie-panel">

<h2
class="panel-title"
id="timelineTitle">

电影时间线

</h2>

<div
class="movie-timeline"
id="movieTimeline">

</div>

</div>

<div class="movie-sidebar">

<h2
class="panel-title"
id="summaryTitle">

数字导演

</h2>

<p
id="directorText">

Echo 将自动整理你的人生片段，
生成持续成长的数字人生电影。

</p >

<button
class="generate-button"
id="generateMovie">

生成数字电影

</button>    </div>

  </div>

  <script>
    const translations = {
      zh: {
        back: "← 返回人生轨迹",
        language: "EN",
        heroLabel: "数字人生电影",
        heroTitle: "我的数字电影",
        heroText:
          "把人生轨迹、共同记忆和成长过程自动整理成一部持续更新的数字电影。",
        sceneLabel: "电影片段",
        memoryLabel: "共同记忆",
        yearLabel: "人生年份",
        timelineTitle: "电影时间线",
        summaryTitle: "数字导演",
        directorText:
          "数字人 Echo 将自动整理你的人生片段，生成持续成长的数字人生电影。",
        generateMovie: "生成数字电影",
        defaultTitle: "共同活动",
        defaultDescription:
          "一次真实的共同参与，成为数字人生的重要片段。",
        emptyMessage: "请先在人生轨迹中选择人生片段。",
        successMessage: "数字电影已经生成并保存。",
        movieTitle: "我的数字人生"
      },

      en: {
        back: "← Back to Life Journey",
        language: "中文",
        heroLabel: "Digital Life Movie",
        heroTitle: "My Digital Movie",
        heroText:
          "Automatically organize your life journey, shared memories and growth into a continuously evolving digital movie.",
        sceneLabel: "Movie Scenes",
        memoryLabel: "Shared Memories",
        yearLabel: "Life Years",
        timelineTitle: "Movie Timeline",
        summaryTitle: "Digital Director",
        directorText:
          "Digital Human Echo organizes your life moments into a continuously growing digital life movie.",
        generateMovie: "Generate Digital Movie",
        defaultTitle: "Shared Activity",
        defaultDescription:
          "A real shared experience has become an important scene in your digital life.",
        emptyMessage:
          "Please select life moments from your Life Journey first.",
        successMessage:
          "Your digital movie has been generated and saved.",
        movieTitle: "My Digital Life"
      }
    };

    let currentLanguage =
      localStorage.getItem("echocityLanguage") || "zh";

    function getText(key) {
      return translations[currentLanguage][key];
    }

    function applyLanguage() {
      document.documentElement.lang =
        currentLanguage === "zh" ? "zh-CN" : "en";

      document.getElementById("backButton").textContent =
        getText("back");

      document.getElementById("languageButton").textContent =
        getText("language");

      document.getElementById("heroLabel").textContent =
        getText("heroLabel");

      document.getElementById("heroTitle").textContent =
        getText("heroTitle");

      document.getElementById("heroText").textContent =
        getText("heroText");

      document.getElementById("sceneLabel").textContent =
        getText("sceneLabel");

      document.getElementById("memoryLabel").textContent =
        getText("memoryLabel");

      document.getElementById("yearLabel").textContent =
        getText("yearLabel");

      document.getElementById("timelineTitle").textContent =
        getText("timelineTitle");

      document.getElementById("summaryTitle").textContent =
        getText("summaryTitle");

      document.getElementById("directorText").textContent =
        getText("directorText");

      document.getElementById("generateMovie").textContent =
        getText("generateMovie");
    }
    const movieQueue =
      JSON.parse(
        localStorage.getItem("echocity_movie_queue")
      ) || [];

    function renderMovieTimeline() {

      const container =
        document.getElementById("movieTimeline");

      container.innerHTML = "";

      document.getElementById("sceneCount").textContent =
        movieQueue.length;

      document.getElementById("memoryCount").textContent =
        movieQueue.length;

      const years =
        new Set();

      movieQueue.forEach(function(movie){

        const date =
          movie.completedAt ||
          movie.createdAt ||
          new Date().toISOString();

        years.add(
          new Date(date).getFullYear()
        );

        const card =
          document.createElement("div");

        card.className =
          "movie-scene";

        card.innerHTML = `
          <div class="scene-year">
            ${new Date(date).toLocaleDateString()}
          </div>

          <div class="scene-title">
           ${movie.title || getText("defaultTitle")}
          </div>

          <div class="scene-description">
           ${movie.description ||
getText("defaultDescription")}
          </div>
        `;

        container.appendChild(card);

      });

      document.getElementById("yearCount").textContent =
        years.size;
    document
      .getElementById("languageButton")
      .addEventListener("click", function () {
        currentLanguage =
          currentLanguage === "zh" ? "en" : "zh";

        localStorage.setItem(
          "echocityLanguage",
          currentLanguage
        );

        applyLanguage();
        renderMovieTimeline();
      });
    }    document
      .getElementById("backButton")
      .addEventListener("click", function () {
        window.location.href = "life-journey.html";
      });

    document
      .getElementById("generateMovie")
      .addEventListener("click", function () {
        if (movieQueue.length === 0) {
         alert(getText("emptyMessage"));
          return;
        }

        const generatedMovie = {
          id: "movie-" + Date.now(),
          title: getText("movieTitle"),
          createdAt: new Date().toISOString(),
          scenes: movieQueue,
          sceneCount: movieQueue.length
        };

        localStorage.setItem(
          "echocity_generated_movie",
          JSON.stringify(generatedMovie)
        );

        alert(getText("successMessage"));
      });

   applyLanguage();
renderMovieTimeline();

  </script>

</div>

</body>
</html>
