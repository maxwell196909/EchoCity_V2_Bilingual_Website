  <style>
    * {

    :root {
      --bg: #061321;

      --panel: #10243a;
      --panel-soft: #162c45;
      --border: rgba(157, 188, 219, 0.22);
      --text: #f4f8ff;
      --muted: #9eb4ca;
      --blue: #2687ee;
      --green: #2fd29b;
      --yellow: #f4b62f;
      --danger: #ef6674;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    button,
    input,
    textarea,
    a {
      font: inherit;
    }

    .page-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 230px 1fr;
    }

    .sidebar {
      padding: 24px 18px;
      border-right: 1px solid var(--border);
      background: var(--sidebar);
    }

    .brand h1 {
      font-size: 25px;
    }

    .brand p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .resident-card {
      padding: 16px;
      margin: 24px 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);

    .resident-avatar {

      height: 54px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2687ee, #735cf5);
      font-size: 20px;
      font-weight: bold;
    }

    }

    .resident-card p {
      margin-top: 6px;
      color: var(--muted);

      line-height: 1.6;

    .sidebar-menu {
      display: grid;

    }

    .sidebar-menu a {
      padding: 12px 13px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 10px;
    }

    .sidebar-menu a:hover,

      border-color: var(--blue);
      background: rgba(38, 135, 238, 0.16);
    }

    .main {

    .topbar {

      align-items: center;
      gap: 16px;
      margin-bottom: 22px;

    }

    .language-button.active {

      background: var(--blue);

  </style>

</style><script>
  const zhButton = document.getElementById("zhButton");
  const enButton = document.getElementById("enButton");

  const memoryIcon = document.getElementById("memoryIcon");
  const memoryTitle = document.getElementById("memoryTitle");
  const memorySummary = document.getElementById("memorySummary");
  const memoryLocation = document.getElementById("memoryLocation");
  const memoryParticipants = document.getElementById("memoryParticipants");
  const memoryDuration = document.getElementById("memoryDuration");
  const memoryScore = document.getElementById("memoryScore");

  const timelineList = document.getElementById("timelineList");
  const sharedFiles = document.getElementById("sharedFiles");
  const participantList = document.getElementById("participantList");
  const echoSummary = document.getElementById("echoSummary");

  let currentLanguage =
    localStorage.getItem("echocityLanguage") || "zh";

  let currentMemory = null;

  function getMemoryFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const encodedMemory = params.get("memory");

    if (!encodedMemory) {
      return null;
    }

    try {
      return JSON.parse(decodeURIComponent(encodedMemory));
    } catch (error) {
      console.warn("Unable to read memory from URL.", error);
      return null;
    }
  }

  function getMemoryFromStorage() {
    const possibleKeys = [
      "echocityBasketballMemory",
      "basketballMemory",
      "echocitySharedMemories",
      "sharedMemories"
    ];

    for (const key of possibleKeys) {
      const savedValue = localStorage.getItem(key);

      if (!savedValue) {
        continue;
      }

      try {
        const parsedValue = JSON.parse(savedValue);

        if (Array.isArray(parsedValue)) {
          return parsedValue[parsedValue.length - 1] || null;
        }

        if (
          parsedValue &&
          typeof parsedValue === "object"
        ) {
          return parsedValue;
        }
      } catch (error) {
        console.warn("Unable to read storage key:", key);
      }
    }

    return null;
  }

  function getDefaultMemory() {
    return {
      type: "basketball",
      titleZh: "周六下午篮球",
      titleEn: "Saturday Afternoon Basketball",
      courtZh: "河西体育馆",
      courtEn: "Hexi Gym",
      participants: 6,
      duration: 92,
      score: "42:38",
      status: "completed",
      createdAt: new Date().toISOString()
    };
  }

  function getText(zhText, enText) {
    return currentLanguage === "zh" ? zhText : enText;
  }

  function getMemoryTitle(memory) {
    return currentLanguage === "zh"
      ? memory.titleZh || memory.title || "共同活动"
      : memory.titleEn || memory.title || "Shared Activity";
  }

  function getMemoryLocation(memory) {
    return currentLanguage === "zh"
      ? memory.courtZh ||
          memory.locationZh ||
          memory.court ||
          memory.location ||
          "地点未记录"
      : memory.courtEn ||
          memory.locationEn ||
          memory.court ||
          memory.location ||
          "Location not recorded";
  }

  function getMemoryIcon(memory) {
    const type = String(memory.type || "").toLowerCase();

    if (type.includes("basketball")) {
      return "🏀";
    }

    if (type.includes("coffee")) {
      return "☕";
    }

    if (
      type.includes("church") ||
      type.includes("faith")
    ) {
      return "⛪";
    }

    if (
      type.includes("movie") ||
      type.includes("film")
    ) {
      return "🎬";
    }

    if (type.includes("volunteer")) {
      return "🤝";
    }

    return "📖";
  }

  function formatDate(dateValue) {
    if (!dateValue) {
      return getText("时间未记录", "Time not recorded");
    }

    const date = new Date(dateValue);

    if (Number.isNaN(date.getTime())) {
      return String(dateValue);
    }

    return new Intl.DateTimeFormat(
      currentLanguage === "zh" ? "zh-CN" : "en-US",
      {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }
    ).format(date);
  }

  function buildSummary(memory) {
    const participants =
      Number(memory.participants) || 0;

    const duration =
      Number(memory.duration) || 0;

    const location = getMemoryLocation(memory);

    if (currentLanguage === "zh") {
      return (
        memory.summaryZh ||
        memory.echoSummaryZh ||
        `本次活动共有 ${participants} 位居民参加，在${location}共同活动 ${duration} 分钟。活动已经完成，过程、参与者和结果均已保存为共同记忆。`
      );
    }

    return (
      memory.summaryEn ||
      memory.echoSummaryEn ||
      `This activity included ${participants} residents at ${location} and lasted ${duration} minutes. The process, participants and outcome have been preserved as a shared memory.`
    );
  }

  function renderOverview() {
    memoryIcon.textContent =
      getMemoryIcon(currentMemory);

    memoryTitle.textContent =
      getMemoryTitle(currentMemory);

    memorySummary.textContent =
      buildSummary(currentMemory);

    memoryLocation.textContent =
      getMemoryLocation(currentMemory);

    memoryParticipants.textContent =
      Number(currentMemory.participants) || 0;

    memoryDuration.textContent =
      Number(currentMemory.duration) || 0;

    memoryScore.textContent =
      currentMemory.score ||
      getText("已完成", "Completed");

    echoSummary.textContent =
      buildSummary(currentMemory);
  }

  function renderTimeline() {
    const createdTime =
      formatDate(currentMemory.createdAt);

    const timelineItems = [
      {
        icon: "✍️",
        time: createdTime,
        titleZh: "Maxwell 发起活动",
        titleEn: "Maxwell created the activity",
        descriptionZh:
          "发布周六下午篮球活动，并邀请附近居民共同参加。",
        descriptionEn:
          "Created a Saturday afternoon basketball activity and invited nearby residents."
      },
      {
        icon: "👥",
        time: getText("活动开始前", "Before the activity"),
        titleZh: "居民完成组队",
        titleEn: "Residents formed the team",
        descriptionZh:
          "Anna、David、Jack、Lucy、Tom 与 Maxwell 完成组队确认。",
        descriptionEn:
          "Anna, David, Jack, Lucy, Tom and Maxwell confirmed the team."
      },
      {
        icon: "📍",
        time: getText("到场阶段", "Arrival stage"),
        titleZh: "居民到达活动地点",
        titleEn: "Residents arrived at the venue",
        descriptionZh:
          `参与居民在${getMemoryLocation(currentMemory)}完成签到。`,
        descriptionEn:
          `Participants checked in at ${getMemoryLocation(currentMemory)}.`
      },
      {
        icon: "🏀",
        time: getText("活动进行中", "During the activity"),
        titleZh: "共同活动进行",
        titleEn: "Shared activity in progress",
        descriptionZh:
          `活动持续 ${
            Number(currentMemory.duration) || 0
          } 分钟，居民完成比赛并形成共同经历。`,
        descriptionEn:
          `The activity lasted ${
            Number(currentMemory.duration) || 0
          } minutes and became a shared experience.`
      },
      {
        icon: "🏆",
        time: getText("活动结束", "Activity completed"),
        titleZh: "活动结果形成",
        titleEn: "Outcome recorded",
        descriptionZh:
          currentMemory.score
            ? `最终结果为 ${currentMemory.score}。`
            : "活动已经顺利完成。",
        descriptionEn:
          currentMemory.score
            ? `The final result was ${currentMemory.score}.`
            : "The activity was completed successfully."
      },
      {
        icon: "📖",
        time: getText("保存完成", "Memory saved"),
        titleZh: "共同记忆已生成",
        titleEn: "Shared memory created",
        descriptionZh:
          "数字人 Echo 整理活动过程，并将这次经历保存进入共同记忆。",
        descriptionEn:
          "Digital Human Echo organized the activity trace and preserved it as a shared memory."
      }
    ];

    timelineList.innerHTML = timelineItems
      .map((item) => {
        return `
          <article class="timeline-item">

            <div class="timeline-dot">
              ${item.icon}
            </div>

            <div class="timeline-content">

              <span class="timeline-time">
                ${item.time}
              </span>

              <h4>
                ${
                  currentLanguage === "zh"
                    ? item.titleZh
                    : item.titleEn
                }
              </h4>

              <p>
                ${
                  currentLanguage === "zh"
                    ? item.descriptionZh
                    : item.descriptionEn
                }
              </p >

            </div>

          </article>
        `;
      })
      .join("");
  }

  function renderParticipants() {
    const participants = [
      {
        initials: "MC",
        name: "Maxwell",
        roleZh: "活动发起人",
        roleEn: "Activity creator"
      },
      {
        initials: "AN",
        name: "Anna",
        roleZh: "参与居民",
        roleEn: "Participant"
      },
      {
        initials: "DV",
        name: "David",
        roleZh: "参与居民",
        roleEn: "Participant"
      },
      {
        initials: "JK",
        name: "Jack",
        roleZh: "参与居民",
        roleEn: "Participant"
      },
      {
        initials: "LC",
        name: "Lucy",
        roleZh: "参与居民",
        roleEn: "Participant"
      },
      {
        initials: "TM",
        name: "Tom",
        roleZh: "参与居民",
        roleEn: "Participant"
      }
    ];

    participantList.innerHTML = participants
      .map((participant) => {
        return `
          <article class="participant-item">

            <div class="participant-avatar">
              ${participant.initials}
            </div>

            <div class="participant-info">

              <strong>
                ${participant.name}
              </strong>

              <span>
                ${
                  currentLanguage === "zh"
                    ? participant.roleZh
                    : participant.roleEn
                }
              </span>

            </div>

          </article>
        `;
      })
      .join("");
  }

  function renderFiles() {
    const files = [
      {
        icon: "💬",
        titleZh: "活动沟通记录",
        titleEn: "Activity conversation",
        descriptionZh:
          "居民在活动前后发送的文字消息和活动通知。",
        descriptionEn:
          "Messages and activity notices sent before and after the activity.",
        actionZh: "查看消息",
        actionEn: "View messages"
      },
      {
        icon: "📷",
        titleZh: "篮球活动合影",
        titleEn: "Basketball group photo",
        descriptionZh:
          "活动结束后由参与居民上传的共同合影。",
        descriptionEn:
          "A shared group photo uploaded after the activity.",
        actionZh: "查看图片",
        actionEn: "View image"
      },
      {
        icon: "🎬",
        titleZh: "比赛精彩视频",
        titleEn: "Game highlight video",
        descriptionZh:
          "活动过程中的视频可以在这里保存和播放。",
        descriptionEn:
          "Videos from the activity can be preserved and played here.",
        actionZh: "播放视频",
        actionEn: "Play video"
      },
      {
        icon: "📎",
        titleZh: "共同活动文件",
        titleEn: "Shared activity file",
        descriptionZh:
          "支持以后上传 PDF、Word、Excel、PPT 等协作文件。",
        descriptionEn:
          "Supports future PDF, Word, Excel, PPT and other collaboration files.",
        actionZh: "查看文件",
        actionEn: "View file"
      }
    ];

    sharedFiles.innerHTML = files
      .map((file) => {
        return `
          <article class="file-card">

            <div class="file-icon">
              ${file.icon}
            </div>

            <div class="file-content">

              <h4>
                ${
                  currentLanguage === "zh"
                    ? file.titleZh
                    : file.titleEn
                }
              </h4>

              <p>
                ${
                  currentLanguage === "zh"
                    ? file.descriptionZh
                    : file.descriptionEn
                }
              </p >

            </div>

            <button
              class="file-action"
              type="button"
            >
              ${
                currentLanguage === "zh"
                  ? file.actionZh
                  : file.actionEn
              }
            </button>

          </article>
        `;
      })
      .join("");
  }

  function setLanguage(language) {
    currentLanguage = language;

    localStorage.setItem(
      "echocityLanguage",
      language
    );

    document.documentElement.lang =
      language === "zh" ? "zh-CN" : "en";

    document
      .querySelectorAll("[data-zh][data-en]")
      .forEach((element) => {
        element.textContent =
          language === "zh"
            ? element.dataset.zh
            : element.dataset.en;
      });

    zhButton.classList.toggle(
      "active",
      language === "zh"
    );

    enButton.classList.toggle(
      "active",
      language === "en"
    );

    renderOverview();
    renderTimeline();
    renderParticipants();
    renderFiles();
  }

  zhButton.addEventListener("click", () => {
    setLanguage("zh");
  });

  enButton.addEventListener("click", () => {
    setLanguage("en");
  });

  currentMemory =
    getMemoryFromUrl() ||
    getMemoryFromStorage() ||
    getDefaultMemory();

  setLanguage(currentLanguage);
</script>

    </main>
  </div>
</body>
</html>
