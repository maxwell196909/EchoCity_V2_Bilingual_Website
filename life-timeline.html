<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>我的生活时间线 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #ffffff;
      background:
        linear-gradient(
          rgba(7, 18, 28, 0.82),
          rgba(7, 18, 28, 0.95)
        ),
        url("city-vision.jpg") center / cover fixed;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 7%;
      background: rgba(8, 22, 32, 0.94);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .logo {
      color: #f1b44c;
      font-size: 24px;
      font-weight: bold;
    }

    .top-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-link {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 17px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
    }

    .top-link:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .page {
      width: min(1080px, 92%);
      margin: 45px auto 70px;
    }

    .hero {
      margin-bottom: 30px;
      padding: 32px;
      text-align: center;
      background:
        linear-gradient(
          145deg,
          rgba(20, 57, 75, 0.96),
          rgba(34, 43, 66, 0.96)
        );
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
    }

    .hero h1 {
      margin-bottom: 12px;
      font-size: 40px;
    }

    .hero p {
      color: #cbd7dd;
      line-height: 1.8;
    }

    .resident-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }

    .avatar {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #17303d;
      font-size: 26px;
      font-weight: bold;
      background: #f1b44c;
      border-radius: 50%;
    }

    .resident-info h2 {
      margin-bottom: 5px;
      font-size: 24px;
    }

    .resident-info p {
      color: #c4d0d6;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.78fr 1.22fr;
      gap: 26px;
    }

    .panel {
      padding: 27px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 22px;
      backdrop-filter: blur(12px);
    }

    .panel h2 {
      margin-bottom: 21px;
      color: #f1b44c;
      font-size: 23px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      color: #ffffff;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #f1b44c;
    }

    input::placeholder,
    textarea::placeholder {
      color: #b8c4ca;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    option {
      color: #111111;
    }

    .add-button {
      width: 100%;
      padding: 14px;
      color: #172b35;
      font-size: 16px;
      font-weight: bold;
      background: #f1b44c;
      border: none;
      border-radius: 28px;
      cursor: pointer;
    }

    .add-button:hover {
      background: #ffd078;
    }

    .clear-button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      color: #ffffff;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 26px;
      cursor: pointer;
    }

    .clear-button:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 8px;
      width: 2px;
      background:
        linear-gradient(
          #f1b44c,
          rgba(241, 180, 76, 0.18)
        );
    }

    .timeline-item {
      position: relative;
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 17px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      top: 25px;
      left: -27px;
      width: 14px;
      height: 14px;
      background: #f1b44c;
      border: 4px solid #17303d;
      border-radius: 50%;
    }

    .timeline-date {
      margin-bottom: 7px;
      color: #f1b44c;
      font-size: 13px;
      font-weight: bold;
    }

    .timeline-item h3 {
      margin-bottom: 8px;
      font-size: 19px;
    }

    .timeline-item p {
      color: #d8e1e5;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .timeline-meta {
      margin-top: 11px;
      color: #9fb0b8;
      font-size: 13px;
    }

    .delete-entry {
      margin-top: 13px;
      padding: 7px 12px;
      color: #ffffff;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      cursor: pointer;
    }

    .delete-entry:hover {
      background: rgba(255, 90, 90, 0.18);
      border-color: rgba(255, 120, 120, 0.45);
    }

    .empty-state {
      padding: 30px 20px;
      color: #b8c6cc;
      text-align: center;
      line-height: 1.8;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 17px;
    }

    .statement {
      margin-top: 28px;
      padding: 22px;
      color: #d5dfe4;
      text-align: center;
      line-height: 1.8;
      background: rgba(8, 22, 32, 0.76);
      border-radius: 18px;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 31px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 13px;
      }

      .resident-bar {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="logo">EchoCity</div>

    <div class="top-links">
      <a class="top-link" href=" ">
        我的家
      </a >

      <a class="top-link" href="identity-card.html">
        我的身份证
      </a >

      <a class="top-link" href="index.html">
        返回首页
      </a >
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>我的生活时间线</h1>

      <p>
        记录我在 EchoCity 中发生的重要事件、成长、关系与共同记忆。<br />
        每一条记录，都是数字生命留下的一次真实回声。
      </p >
    </section>

    <section class="resident-bar">
      <div class="avatar" id="avatar">E</div>

      <div class="resident-info">
        <h2 id="residentName">EchoCity 居民</h2>

        <p id="residentIdentity">
          居民编号：尚未生成
        </p >
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>记录新的生活事件</h2>

        <div class="form-group">
          <label for="eventTitle">事件名称</label>

          <input
            id="eventTitle"
            type="text"
            placeholder="例如：第一次进入 EchoCity"
          />
        </div>

        <div class="form-group">
          <label for="eventType">事件类型</label>

          <select id="eventType">
            <option value="身份">身份</option>
            <option value="成长">成长</option>
            <option value="愿望">愿望</option>
            <option value="家庭">家庭</option>
            <option value="社区">社区</option>
            <option value="关系">关系</option>
            <option value="学习">学习</option>
            <option value="工作">工作</option>
            <option value="信仰">信仰</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="eventDate">发生日期</label>

          <input
            id="eventDate"
            type="date"
          />
        </div>

        <div class="form-group">
          <label for="eventContent">事件内容</label>

          <textarea
            id="eventContent"
            placeholder="记录这一天发生了什么，以及它对我意味着什么。"
          ></textarea>
        </div>

        <button
          class="add-button"
          type="button"
          onclick="addTimelineEvent()"
        >
          加入我的时间线
        </button>

        <button
          class="clear-button"
          type="button"
          onclick="clearTimeline()"
        >
          清空自定义记录
        </button>
      </div>

      <div class="panel">
        <h2>我的数字生活记录</h2>

        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <section class="statement">
      数据不只是记录已经发生的事情，也帮助我们理解自己是谁，以及我们正在成为怎样的人。
    </section>
  </main>

  <script>
    const identityKey = "echoCityIdentity";
    const timelineKey = "echoCityTimeline";

    function formatDate(dateValue) {
      if (!dateValue) {
        return new Date().toLocaleDateString("zh-CN");
      }

      const date = new Date(dateValue + "T00:00:00");

      return date.toLocaleDateString("zh-CN");
    }

    function getSavedIdentity() {
      const savedIdentity =
        localStorage.getItem(identityKey);

      if (!savedIdentity) {
        return null;
      }

      try {
        return JSON.parse(savedIdentity);
      } catch (error) {
        console.error("读取数字身份失败：", error);
        return null;
      }
    }

    function getSavedTimeline() {
      const savedTimeline =
        localStorage.getItem(timelineKey);

      if (!savedTimeline) {
        return [];
      }

      try {
        const timeline = JSON.parse(savedTimeline);

        return Array.isArray(timeline)
          ? timeline
          : [];
      } catch (error) {
        console.error("读取时间线失败：", error);
        return [];
      }
    }

    function saveTimeline(timeline) {
      localStorage.setItem(
        timelineKey,
        JSON.stringify(timeline)
      );
    }

    function createDefaultEvents(identity) {
      const joinDate =
        identity.joinDate ||
        new Date().toLocaleDateString("zh-CN");

      return [
        {
          id: "default-identity",
          date: joinDate,
          title: "建立数字身份",
          type: "身份",
          content:
            "我在 EchoCity 建立了自己的数字身份，成为数字文明中的一名居民。",
          isDefault: true
        },
        {
          id: "default-home",
          date: joinDate,
          title: "进入我的居民主页",
          type: "生活",
          content:
            "我第一次进入自己的居民主页，开始建立属于我的数字生活空间。",
          isDefault: true
        }
      ];
    }

    function loadResidentInformation() {
      const identity = getSavedIdentity();

      if (!identity) {
        alert("还没有创建数字身份，请先建立身份。");
        window.location.href = "mycity.html";
        return null;
      }

      document.getElementById("residentName").textContent =
        identity.name || "EchoCity 居民";

      document.getElementById("residentIdentity").textContent =
        "居民编号：" +
        (identity.identityNumber || "尚未生成");

      document.getElementById("avatar").textContent =
        identity.name
          ? identity.name.charAt(0).toUpperCase()
          : "E";

      return identity;
    }

    function renderTimeline() {
      const identity = getSavedIdentity();

      if (!identity) {
        return;
      }

      const timelineContainer =
        document.getElementById("timeline");

      const defaultEvents =
        createDefaultEvents(identity);

      const customEvents =
        getSavedTimeline();

      const allEvents = [
        ...defaultEvents,
        ...customEvents
      ];

      allEvents.sort(function (a, b) {
        return new Date(b.date) - new Date(a.date);
      });

      timelineContainer.innerHTML = "";

      if (allEvents.length === 0) {
        timelineContainer.innerHTML =
          '<div class="empty-state">还没有生活记录。<br />从今天开始，写下第一段数字生活。</div>';

        return;
      }

      allEvents.forEach(function (event) {
        const item =
          document.createElement("article");

        item.className = "timeline-item";

        const deleteButton =
          event.isDefault
            ? ""
            : `
              <button
                class="delete-entry"
                type="button"
                onclick="deleteTimelineEvent('${event.id}')"
              >
                删除这条记录
              </button>
            `;

        item.innerHTML = `
          <div class="timeline-date">
            ${formatDate(event.date)}
          </div>

          <h3>${escapeHtml(event.title)}</h3>

          <p>${escapeHtml(event.content)}</p >

          <div class="timeline-meta">
            事件类型：${escapeHtml(event.type)}
          </div>

          ${deleteButton}
        `;

        timelineContainer.appendChild(item);
      });
    }

    function addTimelineEvent() {
      const title =
        document
          .getElementById("eventTitle")
          .value
          .trim();

      const type =
        document.getElementById("eventType").value;

      const date =
        document.getElementById("eventDate").value;

      const content =
        document
          .getElementById("eventContent")
          .value
          .trim();

      if (!title) {
        alert("请填写事件名称。");
        document.getElementById("eventTitle").focus();
        return;
      }

      if (!content) {
        alert("请填写事件内容。");
        document.getElementById("eventContent").focus();
        return;
      }

      const timeline = getSavedTimeline();

      timeline.push({
        id:
          "event-" +
          Date.now() +
          "-" +
          Math.floor(Math.random() * 10000),
        date:
          date ||
          new Date().toISOString().split("T")[0],
        title,
        type,
        content,
        isDefault: false
      });

      saveTimeline(timeline);

      document.getElementById("eventTitle").value = "";
      document.getElementById("eventType").value = "身份";
      document.getElementById("eventDate").value = "";
      document.getElementById("eventContent").value = "";

      renderTimeline();

      alert("这段生活记录已经加入时间线。");
    }

    function deleteTimelineEvent(eventId) {
      const confirmed =
        confirm("确定删除这条生活记录吗？");

      if (!confirmed) {
        return;
      }

      const timeline =
        getSavedTimeline().filter(function (event) {
          return event.id !== eventId;
        });

      saveTimeline(timeline);
      renderTimeline();
    }

    function clearTimeline() {
      const timeline = getSavedTimeline();

      if (timeline.length === 0) {
        alert("目前没有自定义生活记录。");
        return;
      }

      const confirmed =
        confirm(
          "确定清空全部自定义生活记录吗？默认身份记录不会删除。"
        );

      if (!confirmed) {
        return;
      }

      localStorage.removeItem(timelineKey);
      renderTimeline();

      alert("自定义生活记录已经清空。");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setTodayAsDefault() {
      const dateInput =
        document.getElementById("eventDate");

      dateInput.value =
        new Date().toISOString().split("T")[0];
    }

    window.addEventListener(
      "DOMContentLoaded",
      function () {
        const identity =
          loadResidentInformation();

        if (!identity) {
          return;
        }

        setTodayAsDefault();
        renderTimeline();
      }
    );
  </script>
</body>
</html>
