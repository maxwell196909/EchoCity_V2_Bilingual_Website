<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愿望广场｜EchoCity</title>
  <link rel="stylesheet" href="style.css?v=20260716-3">
</head>
<body class="inner-page wall-page">
  <header class="simple-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">E</span>
      <span>EchoCity</span>
    </a>
    <a class="btn btn-primary small" href="wish.html">发布愿望</a>
  </header>

  <main class="wall-shell">
    <section class="wall-heading">
      <p class="eyebrow">WISH WALL</p>
      <h1>愿望广场</h1>
      <p>愿望被看见，同行者才有机会出现。</p>
    </section>

    <section class="wall-toolbar">
      <div>
        <strong id="wallCount">正在读取愿望……</strong>
        <p id="wallStatus" class="wall-status">请稍候</p>
      </div>
      <a class="wall-share-link" href="wish.html">＋ 发布一个新愿望</a>
    </section>

    <section id="wishGrid" class="wish-grid" aria-live="polite"></section>
  </main>

  <script>
    const SUPABASE_URL = "https://fhckjaidiqnozhpxkavt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_g--rklRl7JhuX2RsA5L-ow_wi5w9tYa";

    async function loadWishes() {
      const status = document.getElementById("wallStatus");
      const count = document.getElementById("wallCount");
      const grid = document.getElementById("wishGrid");

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/wishes?select=id,created_at,wish,importance,difficulty,companion,first_step&order=created_at.desc&limit=60`,
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        const rows = await response.json();

        if (!response.ok) {
          throw new Error(rows.message || "读取失败");
        }

        if (!rows.length) {
          count.textContent = "还没有愿望";
          status.textContent = "成为第一个发布愿望的人。";
          return;
        }

        count.textContent = `已经有 ${rows.length} 个愿望被看见`;
        status.textContent = "愿望会按照发布时间由新到旧排列。";

        grid.innerHTML = rows.map((item, index) => {
          const avatar = getAvatar(item.wish, index);
          return `
            <article class="wish-card community-card">
              <div class="wish-card-top">
                <div class="wish-avatar" aria-hidden="true">${avatar}</div>
                <div class="wish-meta">
                  <strong>EchoCity 居民</strong>
                  <span title="${formatFullTime(item.created_at)}">${formatRelativeTime(item.created_at)}</span>
                </div>
              </div>

              <div class="wish-card-body">
                <p class="wish-label">愿望</p>
                <h2>${escapeHtml(item.wish)}</h2>

                <div class="wish-detail-list">
                  <p><strong>为什么重要</strong><span>${escapeHtml(item.importance || "未填写")}</span></p>
                  <p><strong>当前困难</strong><span>${escapeHtml(item.difficulty || "未填写")}</span></p>
                  <p><strong>希望同行者</strong><span>${escapeHtml(item.companion || "未填写")}</span></p>
                  <p><strong>第一步</strong><span>${escapeHtml(item.first_step || "未填写")}</span></p>
                </div>
              </div>

              <div class="wish-card-footer">
                <span>愿望编号 EC-${String(item.id).padStart(4, "0")}</span>
                <span class="wish-visible-badge">公开可见</span>
              </div>
            </article>
          `;
        }).join("");
      } catch (error) {
        count.textContent = "愿望读取失败";
        status.textContent = error.message;
        status.classList.add("error");
      }
    }

    function formatRelativeTime(dateString) {
      const then = new Date(dateString);
      const now = new Date();
      const diff = now - then;
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;

      if (diff < minute) return "刚刚";
      if (diff < hour) return `${Math.floor(diff / minute)}分钟前`;
      if (diff < day) {
        if (then.toDateString() === now.toDateString()) {
          return `今天 ${then.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
        }
        return `${Math.floor(diff / hour)}小时前`;
      }

      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      if (then.toDateString() === yesterday.toDateString()) {
        return `昨天 ${then.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
      }

      if (diff < 7 * day) return `${Math.floor(diff / day)}天前`;

      return then.toLocaleDateString("zh-CN", {
        year: then.getFullYear() === now.getFullYear() ? undefined : "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatFullTime(dateString) {
      return new Date(dateString).toLocaleString("zh-CN");
    }

    function getAvatar(text, index) {
      const symbols = ["愿", "梦", "行", "光", "城", "心", "路", "新"];
      let sum = index;
      for (const char of String(text || "")) sum += char.charCodeAt(0);
      return symbols[sum % symbols.length];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadWishes();
    setInterval(loadWishes, 60000);
  </script>
</body>
</html>
