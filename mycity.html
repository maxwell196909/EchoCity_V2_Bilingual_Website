<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>建立我的数字身份 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #ffffff;
      background:
        linear-gradient(
          rgba(8, 20, 30, 0.78),
          rgba(8, 20, 30, 0.9)
        ),
        url("city-vision.jpg") center / cover fixed;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 8%;
      background: rgba(9, 24, 34, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      color: #f1b44c;
      font-size: 24px;
      font-weight: bold;
    }

    .back-link {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 24px;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .page {
      width: min(1100px, 92%);
      margin: 50px auto;
    }

    .intro {
      text-align: center;
      margin-bottom: 36px;
    }

    .intro h1 {
      margin-bottom: 14px;
      font-size: 42px;
    }

    .intro p {
      color: #d5dde2;
      line-height: 1.8;
    }

    .identity-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .panel {
      padding: 30px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      backdrop-filter: blur(12px);
    }

    .panel h2 {
      margin-bottom: 24px;
      color: #f1b44c;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 9px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      color: #ffffff;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #f1b44c;
    }

    input::placeholder,
    textarea::placeholder {
      color: #bcc7cd;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    option {
      color: #111111;
    }

    .create-button {
      width: 100%;
      padding: 15px;
      color: #16232b;
      font-size: 17px;
      font-weight: bold;
      background: #f1b44c;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }

    .create-button:hover {
      background: #ffd078;
    }

    .identity-card {
      min-height: 560px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(
          145deg,
          rgba(20, 54, 72, 0.96),
          rgba(34, 45, 67, 0.96)
        );
    }

    .card-label {
      color: #f1b44c;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 24px 0;
      color: #17303d;
      font-size: 34px;
      font-weight: bold;
      background: #f1b44c;
      border-radius: 50%;
    }

    .card-name {
      margin-bottom: 8px;
      font-size: 34px;
    }

    .card-role {
      margin-bottom: 24px;
      color: #c8d3d9;
    }

    .card-section {
      margin-bottom: 18px;
    }

    .card-section h3 {
      margin-bottom: 5px;
      color: #f1b44c;
      font-size: 14px;
    }

    .card-section p {
      color: #e5ebee;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .card-footer {
      padding-top: 18px;
      color: #aebdc5;
      font-size: 13px;
      line-height: 1.6;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
    }

    @media (max-width: 800px) {
      .identity-layout {
        grid-template-columns: 1fr;
      }

      .intro h1 {
        font-size: 32px;
      }

      .topbar {
        padding: 14px 5%;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="logo">EchoCity</div>

    <a class="back-link" href=" ">
      返回首页
    </a >
  </header>

  <main class="page">
    <section class="intro">
      <h1>建立我的数字身份</h1>

      <p>
        数字身份，不只是姓名和编号。<br />
        它记录我是谁、我相信什么，以及我希望为这个世界带来什么。
      </p >
    </section>

    <section class="identity-layout">
      <div class="panel">
        <h2>创建身份</h2>

        <div class="form-group">
          <label for="name">我的名字</label>

          <input
            id="name"
            type="text"
            placeholder="例如：Peter / Maxwell / Echo"
          />
        </div>

        <div class="form-group">
          <label for="role">我如何描述自己</label>

          <input
            id="role"
            type="text"
            placeholder="例如：城市建设者、教师、工程师、艺术家"
          />
        </div>

        <div class="form-group">
          <label for="mission">我的使命</label>

          <textarea
            id="mission"
            placeholder="我希望通过什么方式，为他人和社会创造价值？"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="values">我的价值观</label>

          <input
            id="values"
            type="text"
            placeholder="例如：诚信、自由、责任、爱、合作"
          />
        </div>

        <div class="form-group">
          <label for="wish">我的愿望</label>

          <textarea
            id="wish"
            placeholder="我希望数字世界因我发生什么美好的改变？"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="city">我希望加入的数字社区</label>

          <select id="city">
            <option value="EchoCity">EchoCity</option>
            <option value="Future City">Future City</option>
            <option value="Faith Community">Faith Community</option>
            <option value="Global Community">Global Community</option>
          </select>
        </div>

        <button
          class="create-button"
          type="button"
          onclick="createIdentity()"
        >
          生成我的数字身份
        </button>
      </div>

      <div class="panel identity-card">
        <div>
          <div class="card-label">
            DIGITAL IDENTITY
          </div>

          <div class="avatar" id="avatar">
            E
          </div>

          <h2 class="card-name" id="cardName">
            你的名字
          </h2>

          <p class="card-role" id="cardRole">
            你如何描述自己
          </p >

          <div class="card-section">
            <h3>我的使命</h3>

            <p id="cardMission">
              你的使命将在这里显示。
            </p >
          </div>

          <div class="card-section">
            <h3>我的价值观</h3>

            <p id="cardValues">
              你的价值观将在这里显示。
            </p >
          </div>

          <div class="card-section">
            <h3>我的愿望</h3>

            <p id="cardWish">
              你的愿望将在这里显示。
            </p >
          </div>

          <div class="card-section">
            <h3>数字社区</h3>

            <p id="cardCity">
              EchoCity
            </p >
          </div>
        </div>

        <div class="card-footer">
          数据文明，不仅仅是数据的输入与输出，而是服务有灵魂的人。
        </div>
      </div>
    </section>
  </main>

  <script>
    function getIdentityFromForm() {
      return {
        name: document.getElementById("name").value.trim(),
        role: document.getElementById("role").value.trim(),
        mission: document.getElementById("mission").value.trim(),
        values: document.getElementById("values").value.trim(),
        wish: document.getElementById("wish").value.trim(),
        city: document.getElementById("city").value
      };
    }

    function updatePreview(data) {
      document.getElementById("cardName").textContent =
        data.name || "你的名字";

      document.getElementById("cardRole").textContent =
        data.role || "你如何描述自己";

      document.getElementById("cardMission").textContent =
        data.mission || "你的使命将在这里显示。";

      document.getElementById("cardValues").textContent =
        data.values || "你的价值观将在这里显示。";

      document.getElementById("cardWish").textContent =
        data.wish || "你的愿望将在这里显示。";

      document.getElementById("cardCity").textContent =
        data.city || "EchoCity";

      document.getElementById("avatar").textContent =
        data.name
          ? data.name.charAt(0).toUpperCase()
          : "E";
    }

    function createIdentity() {
      const identityData = getIdentityFromForm();

      if (!identityData.name) {
        alert("请先填写你的名字。");
        document.getElementById("name").focus();
        return;
      }

      if (!identityData.role) {
        alert("请填写你如何描述自己。");
        document.getElementById("role").focus();
        return;
      }

      updatePreview(identityData);

      localStorage.setItem(
        "echoCityIdentity",
        JSON.stringify(identityData)
      );

      window.location.href = "identity-card.html";
    }

    function loadSavedIdentity() {
      const savedIdentity =
        localStorage.getItem("echoCityIdentity");

      if (!savedIdentity) {
        return;
      }

      try {
        const data = JSON.parse(savedIdentity);

        document.getElementById("name").value =
          data.name || "";

        document.getElementById("role").value =
          data.role || "";

        document.getElementById("mission").value =
          data.mission || "";

        document.getElementById("values").value =
          data.values || "";

        document.getElementById("wish").value =
          data.wish || "";

        document.getElementById("city").value =
          data.city || "EchoCity";

        updatePreview(data);
      } catch (error) {
        console.error("读取数字身份失败：", error);
        localStorage.removeItem("echoCityIdentity");
      }
    }

    document
      .querySelectorAll("input, textarea, select")
      .forEach(function (element) {
        element.addEventListener("input", function () {
          updatePreview(getIdentityFromForm());
        });

        element.addEventListener("change", function () {
          updatePreview(getIdentityFromForm());
        });
      });

    window.addEventListener(
      "DOMContentLoaded",
      loadSavedIdentity
    );
  </script>
</body>
</html>
