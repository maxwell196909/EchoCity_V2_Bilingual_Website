<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>人生轨迹 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(rgba(5, 14, 30, 0.84), rgba(5, 14, 30, 0.96)),
        url("future-city.jpg") center / cover fixed;
      color: #ffffff;
    }

    .page {
      width: min(980px, 94%);
      margin: 0 auto;
      padding: 26px 0 60px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .back-button,
    .language-button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
    }

    .hero {
      padding: 28px;
      border-radius: 26px;
      background: rgba(11, 25, 47, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      margin-bottom: 22px;
    }

    .hero-label {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(74, 166, 255, 0.16);
      color: #9fd3ff;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .hero-title {
      font-size: clamp(32px, 6vw, 52px);
      margin-bottom: 12px;
    }

    .hero-text {
      max-width: 720px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.72);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .summary-card {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

    .summary-number {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .summary-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }

    .journey-panel {
      padding: 24px;
      border-radius: 24px;
      background: rgba(11, 25, 47, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
    }

    .panel-title {
      font-size: 22px;
      margin-bottom: 20px;
    }    .timeline {
      position: relative;
      display: grid;
      gap: 18px;
      padding-left: 28px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: rgba(120, 190, 255, 0.28);
    }

    .journey-item {
      position: relative;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

    .journey-item::before {
      content: "";
      position: absolute;
      left: -27px;
      top: 24px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #68b8ff;
      box-shadow: 0 0 0 6px rgba(104, 184, 255, 0.14);
    }

    .journey-date {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 10px;
    }

    .journey-main {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .journey-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(74, 166, 255, 0.16);
      font-size: 26px;
      flex: 0 0 auto;
    }

    .journey-content {
      flex: 1;
    }

    .journey-title {
      font-size: 19px;
      margin-bottom: 7px;
    }

    .journey-description {
      color: rgba(255, 255, 255, 0.68);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .journey-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .journey-tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.72);
    }

    .journey-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .view-button,
    .movie-button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .view-button {
      background: linear-gradient(135deg, #48b7ff, #746cff);
      color: #ffffff;
    }

    .movie-button {
      background: rgba(255, 255, 255, 0.09);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .empty-state {
      text-align: center;
      padding: 54px 18px;
      color: rgba(255, 255, 255, 0.64);
    }

    @media (max-width: 720px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .journey-panel {
        padding: 20px;
      }

      .journey-main {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top-bar">
      <button class="back-button" id="backButton">← 返回居民主页</button>
      <button class="language-button" id="languageButton">EN</button>
    </div>

    <section class="hero">
      <span class="hero-label" id="heroLabel">个人记录与成果</span>

      <h1 class="hero-title" id="heroTitle">
        我的人生轨迹
      </h1>

      <p class="hero-text" id="heroText">
        每一次参与、共同完成和真实相遇，都会成为你在 EchoCity 中长期保留的人生记录。
      </p >

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-number" id="journeyCount">0</div>
          <div class="summary-label" id="journeyCountLabel">人生片段</div>
        </div>

        <div class="summary-card">
          <div class="summary-number" id="memoryCount">0</div>
          <div class="summary-label" id="memoryCountLabel">共同记忆</div>
        </div>

        <div class="summary-card">
          <div class="summary-number" id="participantCount">0</div>
          <div class="summary-label" id="participantCountLabel">共同参与居民</div>
        </div>
      </div>
    </section>

    <section class="journey-panel">
      <h2 class="panel-title" id="panelTitle">人生时间线</h2>

      <div class="timeline" id="timeline"></div>

      <div class="empty-state" id="emptyState" hidden>
        <h3 id="emptyTitle">还没有人生记录</h3>
        <p id="emptyText">完成一次共同活动后，记录会自动出现在这里。</p >
      </div>
    </section>
  </div>  <script>
    const translations = {
      zh: {
        back: "← 返回居民主页",
        language: "EN",
        heroLabel: "个人记录与成果",
        heroTitle: "我的人生轨迹",
        heroText:
          "每一次参与、共同完成和真实相遇，都会成为你在 EchoCity 中长期保留的人生记录。",
        journeyCountLabel: "人生片段",
        memoryCountLabel: "共同记忆",
        participantCountLabel: "共同参与居民",
        panelTitle: "人生时间线",
        emptyTitle: "还没有人生记录",
        emptyText: "完成一次共同活动后，记录会自动出现在这里。",
        completed: "共同完成",
        participants: "位居民参与",
        messages: "条活动消息",
        moments: "个记录瞬间",
        view: "查看共同记忆",
        movie: "生成数字电影",
        movieMessage: "这段人生片段已经进入数字电影生成队列。",
        defaultTitle: "共同活动",
        defaultLocation: "地点待确认",
        defaultDescription:
          "一次真实的共同参与，已经成为你的人生记录。"
      },

      en: {
        back: "← Back to Resident Profile",
        language: "中文",
        heroLabel: "Personal Records and Outcomes",
        heroTitle: "My Life Journey",
        heroText:
          "Every participation, shared achievement and real encounter becomes a lasting life record in EchoCity.",
        journeyCountLabel: "Life Moments",
        memoryCountLabel: "Shared Memories",
        participantCountLabel: "Residents Connected",
        panelTitle: "Life Timeline",
        emptyTitle: "No life records yet",
        emptyText:
          "Complete a shared activity and the record will appear here automatically.",
        completed: "Completed Together",
        participants: "residents participated",
        messages: "activity messages",
        moments: "recorded moments",
        view: "View Shared Memory",
        movie: "Create Digital Movie",
        movieMessage:
          "This life moment has been added to the digital movie creation queue.",
        defaultTitle: "Shared Activity",
        defaultLocation: "Location to be confirmed",
        defaultDescription:
          "A real shared experience has become part of your life journey."
      }
    };

    let currentLanguage =
      localStorage.getItem("echocityLanguage") || "zh";

    function getText(key) {
      return translations[currentLanguage][key];
    }

    function getJourneyRecords() {
      const journeyRecords =
        JSON.parse(
          localStorage.getItem("echocity_life_journey")
        ) || [];

      const currentMemory =
        JSON.parse(
          localStorage.getItem("echocity_current_memory")
        );

      if (currentMemory) {
        const memoryKey = String(
          currentMemory.id ||
          currentMemory.completedAt ||
          currentMemory.title
        );

        const alreadySaved = journeyRecords.some(function (item) {
          const itemKey = String(
            item.id ||
            item.completedAt ||
            item.title
          );

          return itemKey === memoryKey;
        });

        if (!alreadySaved) {
          journeyRecords.unshift(currentMemory);

          localStorage.setItem(
            "echocity_life_journey",
            JSON.stringify(journeyRecords)
          );
        }
      }

      return journeyRecords;
    }

    function formatDate(value) {
      if (!value) {
        return new Date().toLocaleDateString();
      }

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return date.toLocaleDateString(
        currentLanguage === "zh" ? "zh-CN" : "en-US",
        {
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }
      );
    }

    function createJourneyItem(record, index) {
      const item = document.createElement("article");
      item.className = "journey-item";

      const participantNumber =
        Number(record.participants) || 1;

      const messageNumber =
        Array.isArray(record.messages)
          ? record.messages.length
          : 0;

      const momentNumber =
        Array.isArray(record.moments)
          ? record.moments.length
          : 0;

      item.innerHTML = `
        <div class="journey-date">
          ${formatDate(
            record.completedAt ||
            record.createdAt ||
            record.time
          )}
        </div>

        <div class="journey-main">
          <div class="journey-icon">
            ${record.icon || "🤝"}
          </div>

          <div class="journey-content">
            <h3 class="journey-title">
              ${record.title || getText("defaultTitle")}
            </h3>

            <p class="journey-description">
              ${record.description ||
                record.location ||
                getText("defaultDescription")}
            </p >

            <div class="journey-meta">
              <span class="journey-tag">
                ${getText("completed")}
              </span>

              <span class="journey-tag">
                ${participantNumber}
                ${getText("participants")}
              </span>

              <span class="journey-tag">
                ${messageNumber}
                ${getText("messages")}
              </span>

              <span class="journey-tag">
                ${momentNumber}
                ${getText("moments")}
              </span>
            </div>

            <div class="journey-actions">
              <button
                class="view-button"
                type="button"
                data-index="${index}"
              >
                ${getText("view")}
              </button>

              <button
                class="movie-button"
                type="button"
                data-movie-index="${index}"
              >
                ${getText("movie")}
              </button>
            </div>
          </div>
        </div>
      `;

      return item;
    }    function renderJourney() {
      const records = getJourneyRecords();
      const timeline = document.getElementById("timeline");
      const emptyState = document.getElementById("emptyState");

      document.documentElement.lang =
        currentLanguage === "zh" ? "zh-CN" : "en";

      document.getElementById("backButton").textContent =
        getText("back");

      document.getElementById("languageButton").textContent =
        getText("language");

      document.getElementById("heroLabel").textContent =
        getText("heroLabel");

      document.getElementById("heroTitle").textContent =
        getText("heroTitle");

      document.getElementById("heroText").textContent =
        getText("heroText");

      document.getElementById("journeyCountLabel").textContent =
        getText("journeyCountLabel");

      document.getElementById("memoryCountLabel").textContent =
        getText("memoryCountLabel");

      document.getElementById("participantCountLabel").textContent =
        getText("participantCountLabel");

      document.getElementById("panelTitle").textContent =
        getText("panelTitle");

      document.getElementById("emptyTitle").textContent =
        getText("emptyTitle");

      document.getElementById("emptyText").textContent =
        getText("emptyText");

      const totalParticipants = records.reduce(
        function (sum, record) {
          return sum + (Number(record.participants) || 1);
        },
        0
      );

      document.getElementById("journeyCount").textContent =
        records.length;

      document.getElementById("memoryCount").textContent =
        records.length;

      document.getElementById("participantCount").textContent =
        totalParticipants;

      timeline.innerHTML = "";

      if (records.length === 0) {
        timeline.hidden = true;
        emptyState.hidden = false;
        return;
      }

      timeline.hidden = false;
      emptyState.hidden = true;

      records.forEach(function (record, index) {
        timeline.appendChild(
          createJourneyItem(record, index)
        );
      });
    }

    document
      .getElementById("backButton")
      .addEventListener("click", function () {
        window.location.href = "resident-profile.html";
      });

    document
      .getElementById("languageButton")
      .addEventListener("click", function () {
        currentLanguage =
          currentLanguage === "zh" ? "en" : "zh";

        localStorage.setItem(
          "echocityLanguage",
          currentLanguage
        );

        renderJourney();
      });

    document
      .getElementById("timeline")
      .addEventListener("click", function (event) {
        const viewButton =
          event.target.closest(".view-button");

        const movieButton =
          event.target.closest(".movie-button");

        const records = getJourneyRecords();

        if (viewButton) {
          const index = Number(
            viewButton.dataset.index
          );

          const selectedRecord = records[index];

          if (!selectedRecord) {
            return;
          }

          localStorage.setItem(
            "echocity_current_memory",
            JSON.stringify(selectedRecord)
          );

          window.location.href =
            "memory-detail.html";
        }

        if (movieButton) {
          const index = Number(
            movieButton.dataset.movieIndex
          );

          const selectedRecord = records[index];

          if (!selectedRecord) {
            return;
          }

          const movieQueue =
            JSON.parse(
              localStorage.getItem(
                "echocity_movie_queue"
              )
            ) || [];

          const movieKey = String(
            selectedRecord.id ||
            selectedRecord.completedAt ||
            selectedRecord.title
          );

          const alreadyQueued = movieQueue.some(
            function (item) {
              const itemKey = String(
                item.id ||
                item.completedAt ||
                item.title
              );

              return itemKey === movieKey;
            }
          );

          if (!alreadyQueued) {
            movieQueue.unshift(selectedRecord);

            localStorage.setItem(
              "echocity_movie_queue",
              JSON.stringify(movieQueue)
            );
          }

          alert(getText("movieMessage"));
        }
      });

    renderJourney();
  </script>
</body>
</html>
